<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClarityFinance | المنصة المالية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <h2 class="logo">Clarity</h2>
            <nav>
                <button onclick="App.showScreen('dashboard')" class="nav-item">الرئيسية</button>
                <button onclick="App.showScreen('upload')" class="nav-item">رفع البيانات</button>
                <button onclick="App.showScreen('reports')" class="nav-item">التقارير</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button class="btn-lang" onclick="App.toggleLang()" id="langBtn">English</button>
            </header>

            <section id="screen-content">
                </section>
        </main>
    </div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
